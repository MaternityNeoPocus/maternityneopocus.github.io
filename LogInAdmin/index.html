<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POCUS</title>
    <link rel="icon" type="image/png" href="admin/icon.png">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to POCUS</h1>
        <a class="home" href="../index.html">Return Back</a>
    </header>
    <form action="/login" method="post">
        <h1 class="lit">Admin Log In</h1>

        <label class="unl" for="username">Username:</label>
        <input id="email" class="uni" type="email" id="username" name="username" required><br><br>

        <label class="psl" for="password">Password:</label>
        <input id="password" class="psi" type="password" id="password" name="password" required><br><br>

        <input id="submit" class="lib"  type="submit" value="Log In">     
    </form>
</body>
</html>
